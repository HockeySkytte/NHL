name: Daily player projections update

on:
  schedule:
    # Every day at 18:00 UTC, after Moncton source data is expected to be available.
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season code (e.g. 20252026)"
        required: false
        default: "20252026"

permissions:
  contents: read

concurrency:
  group: daily-player-projections
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      DATABASE_MONCTON_URL: ${{ secrets.DATABASE_MONCTON_URL }}
      XG_PRELOAD: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve season
        id: params
        run: |
          SEASON="${{ inputs.season || '20252026' }}"
          echo "season=$SEASON" >> "$GITHUB_OUTPUT"
          echo "Processing season=$SEASON"

      - name: Export player-game projections
        run: |
          python -u scripts/export_preseason_updating_player_projections.py \
            --season "${{ steps.params.outputs.season }}" \
            --skip-ensure-table \
            --refresh-data \
            --refresh-player-cache

      - name: Export current player projections
        run: |
          python -u scripts/export_current_player_projections.py \
            --skip-ensure-table \
            --refresh-data \
            --refresh-player-cache