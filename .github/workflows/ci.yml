name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Static syntax checks
        run: |
          python -m py_compile app/__init__.py app/routes.py
          python -m compileall -q app tests scripts

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run smoke tests
        env:
          XG_PRELOAD: '0'
          PRESTART_LOGGER: '0'
        run: |
          python -m pytest -q tests/test_smoke_app.py
