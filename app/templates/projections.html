{% extends 'base.html' %}
{% block head %}
<style>
  .proj-page-tabs{ display:flex; gap:10px; align-items:center; margin:0 0 16px 0; flex-wrap:wrap; }
  .proj-page-tabs button{ background:transparent; border:1px solid #2a3142; color:var(--value-text, var(--text)); min-height:40px; padding:0 16px; font-size:14px; border-radius:10px; font-weight:750; letter-spacing:.2px; cursor:pointer; }
  .proj-page-tabs button.active{ outline:2px solid var(--accent); background:rgba(255,255,255,0.03); }
  .proj-panel[hidden]{ display:none !important; }
  .odds-row{ display:flex; justify-content:flex-end; align-items:center; margin:0 0 10px 0; }
  .proj-toolbar{ display:flex; gap:10px; align-items:center; margin:0 0 16px 0; }
  .proj-toolbar button{ background:var(--panel-alt); border:1px solid #2a3142; color:var(--value-text, var(--text)); padding:8px 12px; font-size:14px; border-radius:8px; font-weight:600; cursor:pointer; }
  .proj-toolbar button.active{ background:var(--accent); border-color:var(--accent); }
  .odds-toggle button{ background:var(--panel-alt); border:1px solid #2a3142; color:var(--value-text, var(--text)); padding:6px 12px; font-size:13px; border-radius:8px; font-weight:600; cursor:pointer; }
  .odds-toggle button.active{ background:var(--accent); border-color:var(--accent); }
  .live-table{ width:100%; border-collapse:collapse; font-size:15px; table-layout:auto; }
  .live-table th{ text-align:center; font-size:12px; text-transform:uppercase; letter-spacing:.8px; padding:10px 8px; color:var(--text-dim); font-weight:700; border-bottom:1px solid #222b37; }
  .live-table td{ padding:10px 8px; border-bottom:1px solid #1a2230; word-break:break-word; }
  .live-table th.col-right, .live-table td.col-right{ text-align:right; }
  .live-table th.col-center, .live-table td.col-center{ text-align:center; }
  .live-table th.col-left, .live-table td.col-left{ text-align:left; }
  .team-cell{ display:flex; align-items:center; gap:10px; font-weight:650; }
  .team-cell.right{ justify-content:flex-end; }
  .team-cell img{ height:40px; width:40px; object-fit:contain; filter:drop-shadow(0 0 2px rgba(0,0,0,.6)); }
  .team-name{ display:inline; }
  .status-chip{ font-size:11px; font-weight:700; padding:2px 6px; border-radius:6px; background:#263145; color:#d7deea; }
  .win-bg{ transition:background 0.2s; }
  .bet-bg{ transition:background 0.2s; }
  .odds-input{ width:72px; text-align:center; font-size:15px; border-radius:6px; border:1px solid #2a3142; background:var(--panel-alt); color:var(--value-text, var(--text)); }
  .odds-input:focus{ outline:2px solid var(--accent); }
  .win-duo{ display:inline-flex; gap:6px; align-items:center; justify-content:center; }
  .win-chip{ display:inline-block; padding:6px 10px; border-radius:8px; min-width:68px; text-align:center; font-weight:700; font-size:16px; }
  .bet-chip{ display:inline-block; padding:6px 10px; border-radius:8px; min-width:68px; text-align:center; font-weight:700; font-size:16px; color:#0b0f16; }
  .lineup-btn{ background:transparent; border:1px solid #2a3142; color:var(--text); padding:6px 10px; border-radius:8px; font-weight:650; cursor:pointer; }
  .proj-title{ text-align:center; margin: 0 0 10px 0; font-size:18px; font-weight:750; color:var(--text); }
  /* Modal */
  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal{ background:#0f1522 !important; border:1px solid #2a3142; border-radius:12px; width:min(700px, 92vw); max-height:80vh; overflow:auto; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .modal header{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #2a3142; }
  .modal h3{ margin:0; font-size:18px; font-weight:750; }
  .modal .body{ padding:12px 16px; background:#0f1522; }
  .modal .player-list{ display:flex; flex-direction:column; gap:8px; }
  .modal .footer{ display:flex; gap:10px; justify-content:flex-end; padding:12px 16px; border-top:1px solid #2a3142; background:#0f1522; }
  .btn{ background:var(--panel-alt); border:1px solid #2a3142; color:var(--value-text, var(--text)); padding:8px 12px; border-radius:8px; font-weight:650; cursor:pointer; }
  .btn.primary{ background:var(--accent); color:#0b1017; border-color:var(--accent); }
  .player-item{ display:grid; grid-template-columns: 1fr 360px; align-items:center; column-gap:10px; padding:6px 8px; border:1px solid transparent; border-radius:8px; }
  .player-item:hover{ background:rgba(255,255,255,0.03); border-color:#2a3142; }
  .player-item input{ transform:scale(1.15); }
  .player-meta{ display:flex; align-items:center; gap:8px; min-width:0; }
  .player-name{ font-weight:650; }
  .player-pos{ font-size:11px; color:var(--text-dim); padding:2px 6px; border:1px solid #2a3142; border-radius:6px; }
  .proj-stack{ display:flex; align-items:center; gap:8px; }
  .proj-bar{ position:relative; flex:1 1 auto; height:12px; max-height:12px; min-width:160px; background:#0e1726; border-radius:6px; overflow:hidden; border:1px solid #2a3142; display:flex; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  .proj-bar .half{ height:100%; display:flex; gap:0; flex:0 0 auto; }
  .proj-bar .seg{ height:100%; display:block; flex:0 0 auto; }
  .proj-bar .half.left{ flex-direction:row-reverse; }
  .proj-bar .zero{ position:absolute; left:50%; top:0; bottom:0; width:1px; background:#2a3142; opacity:0.9; }
  .seg-pos{ background:#4f6cf6; }
  .seg-neg{ background:#ff6a6a; }
  .proj-num{ font-size:12px; color:var(--text-dim); min-width:70px; text-align:right; }
  .series-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:16px; }
  .series-card{ background:#0f1522; border:1px solid #2a3142; border-radius:16px; padding:16px; box-shadow:0 8px 24px rgba(0,0,0,.28); }
  .series-card-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 14px 0; }
  .series-meta{ color:var(--text-dim); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .series-score{ font-size:14px; font-weight:700; color:var(--text); }
  .series-team-row{ display:grid; grid-template-columns:1fr auto auto; gap:12px; align-items:center; padding:10px 0; border-top:1px solid rgba(255,255,255,.06); }
  .series-team-row:first-of-type{ border-top:none; }
  .series-team-ident{ display:flex; align-items:center; gap:10px; min-width:0; }
  .series-team-ident img{ width:38px; height:38px; object-fit:contain; filter:drop-shadow(0 0 2px rgba(0,0,0,.6)); }
  .series-team-name{ font-size:15px; font-weight:700; color:var(--text); }
  .series-team-seed{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; }
  .series-team-wins{ min-width:26px; text-align:center; font-size:18px; font-weight:800; color:var(--text); }
  .series-team-prob{ min-width:84px; text-align:right; }
  .series-prob-chip, .cup-prob-chip, .bracket-prob-chip{ display:inline-flex; align-items:center; justify-content:center; min-width:74px; padding:6px 10px; border-radius:999px; font-size:14px; font-weight:800; }
  .series-breakdown{ width:100%; border-collapse:collapse; margin-top:12px; }
  .series-breakdown th, .series-breakdown td{ padding:8px 6px; border-top:1px solid rgba(255,255,255,.06); text-align:center; }
  .series-breakdown th{ color:var(--text-dim); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
  .series-breakdown td{ font-size:14px; color:var(--text); }
  .series-breakdown td:first-child, .series-breakdown th:first-child{ text-align:left; }
  .series-next-game{ margin-top:12px; color:var(--text-dim); font-size:12px; }
  .placeholder-panel{ background:#0f1522; border:1px dashed #2a3142; border-radius:16px; padding:28px 24px; text-align:center; color:var(--text-dim); }
  .bracket-panel-toolbar{ display:flex; justify-content:flex-end; margin:0 0 12px 0; }
  .bracket-panel-btn{ background:var(--panel-alt); border:1px solid #2a3142; color:var(--value-text, var(--text)); padding:8px 12px; border-radius:999px; font-size:13px; font-weight:700; cursor:pointer; }
  .bracket-shell{ width:100%; overflow-x:auto; padding-bottom:8px; }
  .playoff-bracket{ min-width:1320px; display:grid; grid-template-columns: 1.2fr 0.95fr 0.85fr 1fr 0.85fr 0.95fr 1.2fr; gap:14px; align-items:center; }
  .bracket-column{ display:flex; flex-direction:column; gap:18px; }
  .bracket-column.center{ justify-content:center; }
  .bracket-column-title{ text-align:center; color:var(--text-dim); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
  .bracket-series-card{ background:#0f1522; border:1px solid #2a3142; border-radius:16px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,.22); }
  .bracket-series-card.projected{ border-style:dashed; }
  .bracket-series-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:0 0 8px 0; }
  .bracket-series-label{ color:var(--text-dim); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
  .bracket-scoreline{ color:var(--text); font-size:13px; font-weight:700; }
  .bracket-team-line{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0; border-top:1px solid rgba(255,255,255,.06); }
  .bracket-team-line:first-of-type{ border-top:none; }
  .bracket-team-meta{ display:flex; align-items:center; gap:8px; min-width:0; }
  .bracket-team-meta img{ width:40px; height:40px; object-fit:contain; filter:drop-shadow(0 0 2px rgba(0,0,0,.6)); }
  .bracket-team-name{ color:var(--text); font-size:13px; font-weight:700; }
  .bracket-team-subtext{ color:var(--text-dim); font-size:11px; }
  .bracket-wins-chip{ display:inline-flex; align-items:center; justify-content:center; min-width:22px; padding:3px 6px; border-radius:999px; background:#1b2536; color:var(--text); font-size:12px; font-weight:800; }
  .cup-shell{ background:transparent; border:none; border-radius:0; padding:0; }
  .cup-table-wrap{ width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .cup-table{ width:100%; min-width:720px; border-collapse:collapse; }
  .cup-table th, .cup-table td{ padding:10px 8px; border-top:1px solid rgba(255,255,255,.06); text-align:center; }
  .cup-table thead th{ border-top:none; color:var(--text-dim); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
  .cup-table td:first-child, .cup-table th:first-child{ text-align:left; }
  .cup-team-cell{ display:flex; align-items:center; gap:10px; }
  .cup-team-cell img{ width:52px; height:52px; object-fit:contain; filter:drop-shadow(0 0 2px rgba(0,0,0,.6)); }
  .cup-team-name{ color:var(--text); font-weight:700; }

  #bracketPanel:fullscreen{ background:#0b1017; padding:18px; overflow:auto; }
  #bracketPanel:fullscreen #bracketRoot{ padding-left:0; padding-right:0; }
  #bracketPanel:fullscreen .bracket-shell{ overflow:visible; }
  #bracketPanel:fullscreen .playoff-bracket{ min-width:0; width:100%; grid-template-columns: 1.2fr 0.96fr 0.86fr 1fr 0.86fr 0.96fr 1.2fr; gap:16px; align-items:start; }
  #bracketPanel:fullscreen .bracket-series-card{ padding:10px; }

  @media (max-width: 980px){
    .bracket-panel-toolbar{ padding-left:12px; padding-right:12px; }
    .proj-page-tabs{ padding-left:12px; padding-right:12px; gap:8px; }
    .proj-page-tabs button{ padding:0 12px; min-height:36px; font-size:12px; }
    .odds-row{ justify-content:flex-start; }
    /* Use the full canvas width for the table on mobile */
    main{ padding-left:0; padding-right:0; }
    .odds-row, .proj-toolbar, .proj-title{ padding-left:12px; padding-right:12px; }
    #projRoot{ width:100%; margin:0; overflow:hidden; }
    #seriesRoot, #bracketRoot, #cupRoot{ padding-left:12px; padding-right:12px; }
    .playoff-bracket{ min-width:1120px; }
    .cup-table{ min-width:620px; }
    .cup-table th, .cup-table td{ padding:7px 5px; font-size:11px; }
    .cup-table thead th{ font-size:10px; }
    .cup-team-cell{ gap:8px; }
    .cup-team-cell img{ width:42px; height:42px; }
    .cup-team-name{ font-size:13px; }
    .cup-prob-chip{ min-width:58px; padding:4px 6px; font-size:11px; }

    /* Buttons: no padding, fixed tap-height */
    .odds-toggle button{ padding:0; font-size:12px; height:32px; min-width:88px; display:inline-flex; align-items:center; justify-content:center; }
    .proj-toolbar{ gap:8px; }
    .proj-toolbar button{ padding:0; font-size:12px; height:34px; min-width:112px; display:inline-flex; align-items:center; justify-content:center; }

    .live-table{ font-size:12px; width:100%; max-width:100%; }
    .live-table{ table-layout:fixed; }
    /* Table: no inter-column padding/gaps */
    .live-table{ border-spacing:0; }
    .live-table th{ font-size:10px; padding:0; height:24px; }
    .live-table td{ padding:0; height:36px; vertical-align:middle; }
    /* Column sizing (mobile): Bet/Odds narrow, Win% wide */
    .live-table th:nth-child(1), .live-table td:nth-child(1){ width:34px; }
    .live-table th:nth-child(2), .live-table td:nth-child(2){ width:46px; }
    .live-table th:nth-child(3), .live-table td:nth-child(3){ width:38px; }
    .live-table th:nth-child(4), .live-table td:nth-child(4){ width:94px; }
    .live-table th:nth-child(5), .live-table td:nth-child(5){ width:38px; }
    .live-table th:nth-child(6), .live-table td:nth-child(6){ width:46px; }
    .live-table th:nth-child(7), .live-table td:nth-child(7){ width:34px; }

    .team-cell{ gap:0; justify-content:center; }
    .team-cell.right{ justify-content:center; }
    .team-cell img{ height:32px; width:32px; }
    .team-name{ display:none; }

    /* Chips/inputs: no padding, keep text centered and non-wrapping */
    .win-duo{ display:flex; gap:0; align-items:center; justify-content:center; width:100%; }
    .win-chip{
      display:inline-flex; align-items:center; justify-content:center;
      font-size:11.75px; padding:0; margin:0;
      min-width:0; flex:1 1 0;
      border-radius:0;
      height:26px; line-height:1;
      white-space:nowrap;
    }
    .win-duo .win-chip:first-child{ border-top-left-radius:8px; border-bottom-left-radius:8px; }
    .win-duo .win-chip:last-child{ border-top-right-radius:8px; border-bottom-right-radius:8px; }

    .bet-chip{
      display:flex; align-items:center; justify-content:center;
      font-size:10px; padding:0; margin:0;
      width:100%; max-width:100%; min-width:0; box-sizing:border-box;
      border-radius:6px;
      height:22px; line-height:1;
      white-space:nowrap;
    }
    .odds-input{
      width:100%;
      max-width:100%;
      font-size:10.5px;
      padding:0;
      height:22px;
      line-height:22px;
      box-sizing:border-box;
      border-radius:6px;
      text-align:center;
      font-variant-numeric: tabular-nums;
      appearance:textfield;
      -moz-appearance:textfield;
      -webkit-appearance:none;
    }
    .odds-input::-webkit-outer-spin-button,
    .odds-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }

    .lineup-btn{ padding:5px 8px; font-size:12px; }
  }

  /* Extra-tight phones */
  @media (max-width: 420px){
    .live-table th:nth-child(1), .live-table td:nth-child(1){ width:32px; }
    .live-table th:nth-child(2), .live-table td:nth-child(2){ width:44px; }
    .live-table th:nth-child(3), .live-table td:nth-child(3){ width:36px; }
    .live-table th:nth-child(4), .live-table td:nth-child(4){ width:90px; }
    .live-table th:nth-child(5), .live-table td:nth-child(5){ width:36px; }
    .live-table th:nth-child(6), .live-table td:nth-child(6){ width:44px; }
    .live-table th:nth-child(7), .live-table td:nth-child(7){ width:32px; }

    .team-cell img{ height:30px; width:30px; }
    .win-chip{ font-size:11px; }
  }
</style>
{% endblock %}
{% block content %}
<div class="proj-page-tabs">
  <button id="pageTabGames" class="active">Games</button>
  <button id="pageTabSeries">Series</button>
  <button id="pageTabBracket">Bracket</button>
  <button id="pageTabCup">Stanley Cup Probability</button>
</div>
<div id="gamesPanel" class="proj-panel">
  <div class="odds-row">
    <div class="odds-toggle">
      <span style="margin-right:6px;color:var(--text-dim);font-size:12px;letter-spacing:.3px;">Odds:</span>
      <button id="oddsAmerican" class="active">American</button>
      <button id="oddsDecimal">Decimal</button>
    </div>
  </div>
  <div class="proj-toolbar">
    <button id="btnYesterday">Yesterday (ET)</button>

  <h2 id="projDateTitle" class="proj-title"></h2>

</div>

  <div id="seriesRoot"></div>
</div>
<div id="bracketPanel" class="proj-panel" hidden>
  <div class="bracket-panel-toolbar">
    <button id="bracketFullscreenBtn" class="bracket-panel-btn" type="button">Full screen</button>
  </div>
  <div id="bracketRoot"></div>
</div>
<div id="cupPanel" class="proj-panel" hidden>
  <div id="cupRoot"></div>
</div>

<!-- Lineups Modal -->
<div id="lineupModal" class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="lineupTitle">
    <header>
      <h3 id="lineupTitle">Edit Lineup</h3>
      <button class="btn" id="lineupClose">Close</button>
    </header>
    <div class="body">
      <div id="lineupTeamInfo" style="margin:0 0 8px 0; color:var(--text-dim);"></div>
      <div id="playerList" class="player-list"></div>
    </div>
    <div class="footer">
      <button class="btn" id="lineupCancel">Cancel</button>
      <button class="btn primary" id="lineupApply">Apply</button>
    </div>
  </div>
  
</div>
<script id="teams-data" type="application/json">{{ teams|tojson|safe }}</script>
{% endblock %}
{% block scripts %}
<script>
const root = document.getElementById('projRoot');
const pageTabGames = document.getElementById('pageTabGames');
const pageTabSeries = document.getElementById('pageTabSeries');
const pageTabBracket = document.getElementById('pageTabBracket');
const pageTabCup = document.getElementById('pageTabCup');
const gamesPanel = document.getElementById('gamesPanel');
const seriesPanel = document.getElementById('seriesPanel');
const bracketPanel = document.getElementById('bracketPanel');
const cupPanel = document.getElementById('cupPanel');
const bracketFullscreenBtn = document.getElementById('bracketFullscreenBtn');
const seriesRoot = document.getElementById('seriesRoot');
const bracketRoot = document.getElementById('bracketRoot');
const cupRoot = document.getElementById('cupRoot');
const btnToday = document.getElementById('btnToday');
const btnYesterday = document.getElementById('btnYesterday');
const btnTomorrow = document.getElementById('btnTomorrow');
const dateEl = document.getElementById('projDateTitle');
const oddsAmericanBtn = document.getElementById('oddsAmerican');
const oddsDecimalBtn = document.getElementById('oddsDecimal');
// Modal refs
const modalBackdrop = document.getElementById('lineupModal');
const modalClose = document.getElementById('lineupClose');
const modalCancel = document.getElementById('lineupCancel');
const modalApply = document.getElementById('lineupApply');
const playerListEl = document.getElementById('playerList');
const lineupTeamInfoEl = document.getElementById('lineupTeamInfo');

// Caches and overrides
window._lineupsCache = window._lineupsCache || null; // contents of lineups_all.json
window._rosterCache = window._rosterCache || {}; // { [TEAM]: roster json from /api/roster/<TEAM>/current }
window._currentGamesById = window._currentGamesById || {};
window._winOverrides = window._winOverrides || {}; // { [gameId]: { away: p, home: p } }
window._currentProjCache = window._currentProjCache || null; // { [playerId:number]: { pos: 'F'|'D'|'G', displayTotal: num|null, rawTotal: num|null } }
window._playoffCache = window._playoffCache || null;

let _dialogState = null; // { gameId, side, teamAbbrev, baselineCount }
let _currentWhich = 'today';
let _activeProjTab = 'games';

let oddsMode = 'american'; // 'american' | 'decimal'

function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

function hexToRgb(hex){
  try{
    let h = String(hex||'').trim();
    if(!h.startsWith('#')) return null;
    h = h.slice(1);
    if(h.length===3) h = h.split('').map(c=>c+c).join('');
    if(h.length!==6) return null;
    const r = parseInt(h.slice(0,2),16);
    const g = parseInt(h.slice(2,4),16);
    const b = parseInt(h.slice(4,6),16);
    if(!Number.isFinite(r)||!Number.isFinite(g)||!Number.isFinite(b)) return null;
    return {r,g,b};
  }catch(_){ return null; }
}

function mixHex(hexA, hexB, t){
  const a = hexToRgb(hexA);
  const b = hexToRgb(hexB);
  if(!a || !b) return hexA;
  const tt = clamp(Number(t)||0, 0, 1);
  const r = Math.round(a.r*(1-tt) + b.r*tt);
  const g = Math.round(a.g*(1-tt) + b.g*tt);
  const bb = Math.round(a.b*(1-tt) + b.b*tt);
  return `rgb(${r},${g},${bb})`;
}

function getTextColorForBg(bgColor){
  // Parse rgba/rgb string or hex, return appropriate text color
  const match = (bgColor||'').match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if(match){
    const r = parseInt(match[1], 10);
    const g = parseInt(match[2], 10);
    const b = parseInt(match[3], 10);
    const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return luminance > 0.5 ? '#000000' : '#ffffff';
  }
  // Try hex format
  let hex = String(bgColor||'').trim().replace('#', '');
  if(hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  if(hex.length === 6){
    const r = parseInt(hex.substring(0,2), 16);
    const g = parseInt(hex.substring(2,4), 16);
    const b = parseInt(hex.substring(4,6), 16);
    if(Number.isFinite(r) && Number.isFinite(g) && Number.isFinite(b)){
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? '#000000' : '#ffffff';
    }
  }
  return '#ffffff';
}

// --- Odds helpers (American/Decimal) ---
function toDecimal(american){
  if(american==null || american==='') return null;
  const a = Number(american);
  if(!Number.isFinite(a)) return null;
  if(a > 0) return 1 + (a/100);
  if(a < 0) return 1 + (100/Math.abs(a));
  return null;
}

function toAmerican(decimal){
  if(decimal==null || decimal==='') return null;
  const d = Number(decimal);
  if(!Number.isFinite(d) || d <= 1) return null;
  if(d >= 2){
    return Math.round((d - 1) * 100);
  }
  return Math.round(-100 / (d - 1));
}

function parseAmerican(val){
  if(val==null) return null;
  const s = String(val).trim();
  if(!s) return null;
  // If it looks like a decimal (contains a dot or >=1.01 and < 10), convert to American
  const n = Number(s);
  if(Number.isFinite(n)){
    if(n >= 1.01 && n < 10) return toAmerican(n);
    // Already American-style number
    return Math.round(n);
  }
  // Fallback: try stripping + sign
  const s2 = s.replace(/^\+/,'');
  const n2 = Number(s2);
  if(Number.isFinite(n2)) return Math.round(n2);
  return null;
}

function renderPlayerItems(list, preselectIds){
  // Scale bars by global max positive/negative totals and skew zero accordingly
  let posMax = 0, negMaxAbs = 0;
  for(const p of list){
    const t = Number(p.total);
    if(!Number.isFinite(t)) continue;
    if(t > 0 && t > posMax) posMax = t;
    if(t < 0 && Math.abs(t) > negMaxAbs) negMaxAbs = Math.abs(t);
  }
  const denom = posMax + negMaxAbs;
  const leftPct = denom>0 ? (100 * (negMaxAbs/denom)) : 50;
  const rightPct = 100 - leftPct;
  const rows = list.map(p=>{
  const defaultChecked = preselectIds ? preselectIds.has(p.id) : ((p.pos==='F' || p.pos==='D') ? (String(p.unit||'').toUpperCase()!=='EXT') : (p.pos==='G' ? (String(p.unit||'').toUpperCase()==='G1') : false));
    const t = Number(p.total);
    const isPos = Number.isFinite(t) && t>0;
    const isNeg = Number.isFinite(t) && t<0;
    const posWidth = (isPos && posMax>0) ? (100 * (t/posMax)) : 0;
    const negWidth = (isNeg && negMaxAbs>0) ? (100 * (Math.abs(t)/negMaxAbs)) : 0;
  const negHtml = isNeg ? `<span class="seg seg-neg" style="width:${negWidth}%;"></span>` : '';
  const posHtml = isPos ? `<span class="seg seg-pos" style="width:${posWidth}%;"></span>` : '';
    const barHtml = `
      <span class="proj-bar">
        <span class="half left" style="width:${leftPct}%;">${negHtml}</span>
        <span class="half right" style="width:${rightPct}%;">${posHtml}</span>
        <span class="zero" style="left:${leftPct}%;"></span>
      </span>`;
    const totalStr = (p.total!=null) ? Number(p.total).toFixed(3) : 'n/a';
    return `<label class="player-item">
      <span class="player-meta"><input type="checkbox" data-id="${p.id??''}" data-name="${p.name.replace(/\"/g,'&quot;')}" data-pos="${p.pos}" data-unit="${p.unit||''}" ${defaultChecked?'checked':''}/> <span class="player-name">${p.name}</span> <span class="player-pos">${p.pos}${p.unit?` • ${p.unit}`:''}</span></span>
      <span class="proj-stack">${barHtml}<span class="proj-num">${totalStr}</span></span>

}
  function winBgColor(percent){
    const p = Math.max(20, Math.min(80, percent));
    let r,g,b;
    if(p <= 50){
      const t = p/50;
      r = Math.round(255*(1-t) + 255*t);
      g = Math.round(77*(1-t) + 255*t);
      b = Math.round(77*(1-t) + 255*t);
    }else{
      const t = (p-50)/50;
      r = Math.round(255*(1-t) + 77*t);
      g = Math.round(255*(1-t) + 163*t);
      b = Math.round(255*(1-t) + 255*t);
    }
    return `rgba(${r},${g},${b},0.85)`;
  }
  function betBgColor(val){
    const v = Math.max(0, Math.min(0.1, val||0));
    const t = v / 0.1;
    const r = Math.round(255*(1-t) + 77*t);
    const g = Math.round(255*(1-t) + 163*t);
    const b = Math.round(255*(1-t) + 255*t);
    const a = 0.85;
    return `rgba(${r},${g},${b},${a})`;
  }

  // 0.3 Kelly fraction based on win probability and American moneyline
  function kelly03(prob, american){
    if(prob==null || american==null) return null;
    const p = Number(prob);
    if(!(p>=0 && p<=1)) return null;
    const dec = toDecimal(american);
    if(dec==null) return null;
    const b = dec - 1;
    if(!(b>0)) return null;
    const q = 1 - p;
    const f = (b*p - q) / b;
    const fScaled = 0.3 * f;
    if(!(fScaled>0)) return null;
    return fScaled;
  }

function formatPct(prob){
  const p = Number(prob);
  return Number.isFinite(p) ? `${(p * 100).toFixed(1)}%` : 'n/a';
}

function probHeatBg(prob){
  const p = clamp(Number(prob)||0, 0, 1);
  const low = { r: 198, g: 72, b: 72 };
  const mid = { r: 49, g: 60, b: 79 };
  const high = { r: 74, g: 127, b: 255 };
  let from = low;
  let to = mid;
  let t = p / 0.5;
  if(p >= 0.5){
    from = mid;
    to = high;
    t = (p - 0.5) / 0.5;
  }
  const r = Math.round(from.r + ((to.r - from.r) * t));
  const g = Math.round(from.g + ((to.g - from.g) * t));
  const b = Math.round(from.b + ((to.b - from.b) * t));
  return `rgba(${r},${g},${b},0.9)`;
}

function renderProbChip(prob, cls='series-prob-chip'){
  const bg = probHeatBg(prob);
  return `<span class="${cls}" style="background:${bg}; color:${getTextColorForBg(bg)}">${formatPct(prob)}</span>`;
}

function renderCup(rows){
  if(!Array.isArray(rows) || !rows.length){
    cupRoot.innerHTML = '<div class="placeholder-panel">Stanley Cup probabilities are unavailable.</div>';
    return;
  }
  const body = rows.map(row=>{
    const team = row.team || {};
    const logo = getTeamLogo(team);
    const name = getTeamDisplayName(team);
    return `<tr>
      <td>
        <div class="cup-team-cell">
          ${logo ? `<img src="${logo}" alt="${team.abbrev || name}" />` : ''}
          <div>
            <div class="cup-team-name">${name}</div>
            <div class="series-meta">${team.abbrev || ''}</div>
          </div>
        </div>
      </td>
      <td>${renderProbChip(row.secondRoundProb, 'cup-prob-chip')}</td>
      <td>${renderProbChip(row.conferenceFinalProb, 'cup-prob-chip')}</td>
      <td>${renderProbChip(row.stanleyCupFinalProb, 'cup-prob-chip')}</td>
      <td>${renderProbChip(row.stanleyCupProb, 'cup-prob-chip')}</td>
    </tr>`;
  }).join('');
  cupRoot.innerHTML = `<div class="cup-shell">
    <div class="cup-table-wrap">
      <table class="cup-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Round 2</th>
            <th>Conference Final</th>
            <th>Stanley Cup Final</th>
            <th>Stanley Cup</th>
          </tr>
        </thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  </div>`;
}

// ------- Lineups dialog + Win% adjustment -------
async function ensureLineupsCache(){
  if(window._lineupsCache) return window._lineupsCache;
  try{
    const r = await fetch('/api/lineups/all', { cache:'no-store' });
    if(r.ok){
      window._lineupsCache = await r.json();
      try{ console.log('[lineups] loaded keys:', Object.keys(window._lineupsCache||{}).length); }catch(_){/* noop */}
    }else{
      let detail = null;
      try{ detail = await r.json(); }catch(_){ detail = null; }
      try{ console.error('[lineups] failed:', r.status, detail || '(no json)'); }catch(_){/* noop */}
    }
  }catch(e){ /* ignore */ }
  return window._lineupsCache;
}

async function ensureRosterCache(teamAbbrev){
  const t = String(teamAbbrev||'').toUpperCase();
  if(!t) return null;
  if(window._rosterCache && window._rosterCache[t]) return window._rosterCache[t];
  try{
    const r = await fetch(`/api/roster/${encodeURIComponent(t)}/current`, { cache:'no-store' });
    if(!r.ok) return null;
    const js = await r.json();
    window._rosterCache = window._rosterCache || {};
    window._rosterCache[t] = js;
    return js;
  }catch(_){
    return null;
  }
}

async function ensureCurrentProjections(){
  if(window._currentProjCache) return window._currentProjCache;
  try{
    const r = await fetch('/api/player-current-projections', { cache:'no-store' });
    if(!r.ok) return null;
    const data = await r.json();
    if(!data || typeof data !== 'object') return null;
    const parseLocaleNumber = (val) => {
      if(val == null || val === '') return null;
      if(typeof val === 'number') return val;
      const s = String(val).trim().replace(',', '.');
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    };
    const map = {};
    for(const [id, row] of Object.entries(data)){
      const pid = Number(id);
      if(!pid) continue;
      const pos = String(row.position || row.Position || row.Pos || '').trim().toUpperCase();
      const legacyTotal = [
        parseLocaleNumber(row.Age),
        parseLocaleNumber(row.Rookie),
        parseLocaleNumber(row.EVO),
        parseLocaleNumber(row.EVD),
        parseLocaleNumber(row.PP),
        parseLocaleNumber(row.SH),
        parseLocaleNumber(row.GSAx),
      ].reduce((sum, value)=> sum + (Number.isFinite(value) ? value : 0), 0);
      const projectedValue = parseLocaleNumber(row.projected_value ?? row.projectedValue);
      const rawProjectedValue = parseLocaleNumber(row.raw_projected_value ?? row.rawProjectedValue);
      map[pid] = {
        pos: (pos||'F')[0],
        displayTotal: Number.isFinite(projectedValue) ? projectedValue : legacyTotal,
        rawTotal: Number.isFinite(rawProjectedValue) ? rawProjectedValue : legacyTotal,
      };
    }
    window._currentProjCache = map;
    try{ console.log('[projections] current player projections loaded:', Object.keys(map).length, 'players'); }catch(_){/* ignore */}
    return map;
  }catch(e){ 
    console.error('[projections] Failed to load current player projections:', e);
    return null; 
  }
}

function extractPlayerName(p){
  if(!p) return '';
  // Attempt to support API variations
  if(p.firstName && p.lastName){
    const fn = typeof p.firstName === 'object' ? (p.firstName.default || Object.values(p.firstName)[0] || '') : p.firstName;
    const ln = typeof p.lastName === 'object' ? (p.lastName.default || Object.values(p.lastName)[0] || '') : p.lastName;
    return `${fn} ${ln}`.trim();
  }
  return p.fullName || p.person?.fullName || p.name || '';
}

function getTeamLineup(teamAbbrev){
  const cache = window._lineupsCache || {};
  return cache?.[String(teamAbbrev||'').toUpperCase()] || {};
}

function getTeamUpdatedAt(teamAbbrev){
  const cache = window._lineupsCache || {};
  const info = cache?.[String(teamAbbrev||'').toUpperCase()] || {};
  const iso = info.generated_at || info.generatedAt || null;
  if(!iso) return '';
  try{
    const d = new Date(String(iso).replace('Z','+00:00'));
    if(isNaN(d)) return String(iso);
    return d.toLocaleString();
  }catch(_){ return String(iso); }
}

function playerIdOf(p){
  if(!p) return null;
  const tryFields = [p.playerId, p.id, p.personId, p.person?.id, p.person?.link?.split('/')?.pop?.()];
  for(const t of tryFields){ const n = Number(t); if(Number.isInteger(n) && n>0) return n; }
  return null;
}

function posOf(p){
  const raw = (p.pos || p.position || p.primaryPosition?.type || p.primaryPosition?.abbreviation || '').toString().toUpperCase();
  if(raw.startsWith('F') || raw==='C' || raw==='LW' || raw==='RW') return 'F';
  if(raw.startsWith('D')) return 'D';
  if(raw.startsWith('G')) return 'G';
  return 'F';
}

function unitOf(p){
  return (p.unit||'').toString().toUpperCase();
}

function buildPlayerList(teamAbbrev, projMap, roster){
  // Base list from Sheets lineups; then append missing roster players as EXT.
  const lu = getTeamLineup(teamAbbrev);
  const goalies = [];
  const forwards = [];
  const defense = [];
  const pushItem = (arr, it, posCode)=>{
    const id0 = (Number(it.playerId)||null);
    const name = String(it.name||'');
    const unit = String(it.unit||'').toUpperCase();
    const pos = posCode;
    const metrics = (id0 && projMap) ? projMap[id0] : null;
    const total = metrics && Number.isFinite(metrics.displayTotal) ? metrics.displayTotal : null;
    const rawTotal = metrics && Number.isFinite(metrics.rawTotal) ? metrics.rawTotal : null;
    arr.push({ id: id0, name, pos, unit, metrics, total, rawTotal });
  };
  // Keep original order from lineup; no re-sort to preserve lines/pairs
  for(const it of (lu.goalies||[])) pushItem(goalies, it, 'G');
  for(const it of (lu.forwards||[])) pushItem(forwards, it, 'F');
  for(const it of (lu.defense||[])) pushItem(defense, it, 'D');

  const existingIds = new Set();
  for(const p of [...goalies, ...forwards, ...defense]){
    if(p.id) existingIds.add(Number(p.id));
  }

  const pushExt = (arr, r, posCode)=>{
    const id0 = playerIdOf(r);
    if(!id0 || existingIds.has(id0)) return;
    const name = extractPlayerName(r);
    if(!name) return;
    existingIds.add(id0);
    const metrics = (id0 && projMap) ? projMap[id0] : null;
    const total = metrics && Number.isFinite(metrics.displayTotal) ? metrics.displayTotal : null;
    const rawTotal = metrics && Number.isFinite(metrics.rawTotal) ? metrics.rawTotal : null;
    arr.push({ id: id0, name, pos: posCode, unit: 'EXT', metrics, total, rawTotal });
  };

  if(roster){
    for(const r of (roster.goalies||[])) pushExt(goalies, r, 'G');
    for(const r of (roster.forwards||[])) pushExt(forwards, r, 'F');
    for(const r of (roster.defensemen||[])) pushExt(defense, r, 'D');
  }

  return [...goalies, ...forwards, ...defense];
}

function adjustWinForSelection(gameId, side, ratioDelta){
  const g = window._currentGamesById[gameId];
  if(!g || !g.projections) return;
  const pA0 = Number(g.projections.winProbAway);
  const pH0 = Number(g.projections.winProbHome);
  if(!(pA0>0 && pA0<1 && pH0>0 && pH0<1)) return;
  const K = 1.0; // sensitivity factor
  const clamp = (x,min,max)=>Math.max(min,Math.min(max,x));
  const logit = p=>Math.log(p/(1-p));
  const invlogit = z=>1/(1+Math.exp(-z));
  let zA = logit(pA0);
  let zH = logit(pH0);
  const delta = clamp(ratioDelta, -0.5, 0.5) * K; // bound influence
  if(side==='away'){
    zA = zA + delta;
  }else{
    zH = zH + delta;
  }
  let pA = invlogit(zA);
  let pH = invlogit(zH);
  // Normalize to sum to 1
  const s = pA + pH;
  pA = pA / s; pH = pH / s;
  window._winOverrides[gameId] = { away: pA, home: pH };
  // Re-render with current table games when available
  const tableGames = Object.values(window._currentGamesById);
  renderTable(tableGames);
}

function recomputeWinWithSelection(gameId, side, selected){
  const g = window._currentGamesById[gameId];
  if(!g || !g.projections) return;
  const projBaseAway = Number(g.projections.projAway) || 0;
  const projBaseHome = Number(g.projections.projHome) || 0;
  const sVal = Number(g.projections.situationValue) || 0;
  const team = side==='away' ? (g.awayTeam?.abbrev||'') : (g.homeTeam?.abbrev||'');
  const projMap = window._currentProjCache || {};
  const ROOKIE_FALLBACK = { 'D': -0.031768511, 'F': -0.024601581, 'G': -0.12 };
  const sumTeam = ()=>{
    let total = 0;
    // Non-goalies: sum all
    for(const p of selected){
      const POS = (p.pos||'F').toUpperCase()[0];
      if(POS==='G') continue;
      const m = (p.id && projMap[p.id]) ? projMap[p.id] : null;
      if(m && Number.isFinite(m.rawTotal)) total += m.rawTotal; else total += (ROOKIE_FALLBACK[POS] ?? ROOKIE_FALLBACK['F']);
    }
    // Goalies: include only one, prefer unit G1
    const goalies = selected.filter(p=> (p.pos||'F').toUpperCase().startsWith('G'));
    let gPick = goalies.find(p=> String(p.unit||'').toUpperCase()==='G1') || goalies[0] || null;
    if(gPick){
      const m = (gPick.id && projMap[gPick.id]) ? projMap[gPick.id] : null;
      const gValue = (m && Number.isFinite(m.rawTotal)) ? m.rawTotal : ROOKIE_FALLBACK['G'];
      console.log('[recompute] Selected goalie:', gPick.name, 'ID:', gPick.id, 'Metrics:', m, 'Value:', gValue);
      total += gValue;
    }
    return total;
  };
  const teamSum = sumTeam();
  let projAway = projBaseAway;
  let projHome = projBaseHome;
  if(side==='away') projAway = teamSum; else projHome = teamSum;
  const dproj = projAway - projHome;
  const winAway = 1.0/(1.0 + Math.exp(-(dproj) - sVal));
  const winHome = 1.0 - winAway;
  console.log('[recompute]', side, 'team:', team, '| TeamSum:', teamSum.toFixed(3), '| ProjAway:', projAway.toFixed(3), '| ProjHome:', projHome.toFixed(3), '| dProj:', dproj.toFixed(3), '| WinAway:', (winAway*100).toFixed(1) + '%');
  window._winOverrides[gameId] = { away: winAway, home: winHome };
  const tableGames = Object.values(window._currentGamesById);
  renderTable(tableGames);
}
