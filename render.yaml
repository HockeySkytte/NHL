services:
  - type: web
    name: nhl-analytics
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT wsgi:app"
    autoDeploy: true
    plan: free
    envVars:
      - key: FLASK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONTHLY_ID
        sync: false
      - key: STRIPE_PRICE_YEARLY_ID
        sync: false
      - key: APP_BASE_URL
        sync: false
cronJobs:
  - name: update-lineups-30m
    schedule: "*/30 * * * *"
    command: "python -u scripts/lineups.py --all --quiet --out-all app/static/lineups_all.json"
    timezone: UTC
  - name: daily-update-data
    schedule: "15 9 * * *"
    command: "python -u scripts/update_data.py --date $(python -c 'from datetime import datetime, timedelta, timezone; import sys; sys.stdout.write((datetime.now(timezone.utc)-timedelta(days=1)).strftime(\"%Y-%m-%d\"))') --export --season 20252026 --replace-date --rebuild-team-seasonstats --run-rapm"
    timezone: UTC
